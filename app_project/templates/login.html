{% extends "base.html" %}
{% block title %}Login · BookLog{% endblock %}
{% block content %}
  <div class="auth-page">
    <section class="auth-card">
      <p class="tag">Welcome back</p>
      <h1>Login</h1>
      <form method="post">
        <label>
          Email
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button" type="submit">Login</button>
      </form>
      <p class="form-note">New to BookLog? <a href="{{ url_for('register') }}">Create an account</a>.</p>
    </section>
  </div>
{% endblock %}
